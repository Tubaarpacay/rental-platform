<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Rental Platform{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Kendi CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-light">

    <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                Rental Platform
            </a>

            <button
                class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Ana Sayfa</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/items-page">İlanlar</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/login-page">Giriş</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/register-page">Kayıt Ol</a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- Sayfa İçeriği -->
    <div class="container py-5">

        {% block content %}
        {% endblock %}

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
